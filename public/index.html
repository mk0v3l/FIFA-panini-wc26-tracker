<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Panini FIFA WC — Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── SIDEBAR ── -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">⚽</div>
      <div>
        <div class="logo-title">FIFA WC</div>
        <div class="logo-sub">Panini Tracker</div>
      </div>
    </div>

    <div class="global-progress">
      <div class="gp-label">
        <span>Collection</span>
        <span id="global-pct">0%</span>
      </div>
      <div class="progress-bar"><div id="global-bar" class="progress-fill"></div></div>
      <div class="gp-counts" id="global-counts">0 / 0 stickers</div>
    </div>

    <nav id="team-nav"></nav>

    <div class="export-section">
      <div class="export-title">Exporter</div>
      <a class="export-btn missing-btn" href="/api/export/missing" download>
        📋 Cartes manquantes
      </a>
      <a class="export-btn doubles-btn" href="/api/export/doubles" download>
        🔄 Doublons
      </a>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main id="main">
    <!-- Mobile header -->
    <header id="mobile-header">
      <button id="menu-btn" aria-label="Menu">☰</button>
      <span id="mobile-title">FIFA WC Tracker</span>
      <div id="mobile-progress-text">0%</div>
    </header>

    <!-- Content area -->
    <div id="content">
      <div id="overview-page" class="page active">
        <h1 class="page-title">Vue d'ensemble</h1>
        <div id="overview-grid"></div>
      </div>
      <div id="team-page" class="page">
        <!-- filled dynamically -->
      </div>
    </div>
  </main>

  <!-- ── TOAST ── -->
  <div id="toast"></div>

  <!-- ── OVERLAY ── -->
  <div id="overlay" onclick="closeSidebar()"></div>

  <script src="js/app.js"></script>
</body>
</html>
